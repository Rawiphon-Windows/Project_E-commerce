<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce Product</title>
    <style>
        .product-card {
            border: 1px solid #ddd;
            padding: 16px;
            border-radius: 8px;
            width: 250px;
            text-align: center;
            font-family: sans-serif;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.1);
        }
        .price {
            color: #e44d26;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="product-card">
        <h3>Mechanical Keyboard</h3>
        <p>คีย์บอร์ดสำหรับโปรแกรมเมอร์ พิมพ์สนุก เสียงเพราะ</p>
        <p class="price">฿ 2,590</p>
        <button class="btn">Add to Cart</button>
    </div>
</body>
</html>
